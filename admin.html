<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Order Admin | Luxe En Vogue</title>
    <meta name="robots" content="noindex, nofollow" />
    <link rel="stylesheet" href="style.css" />
    <style>
      /* ---- Admin-only additions (kept out of style.css on purpose,
              so this page never affects the public site's CSS) ---- */
      .admin-wrap {
        max-width: 1100px;
        margin: 60px auto 100px;
        padding: 0 var(--pad);
      }
      .admin-login {
        max-width: 420px;
        margin: 120px auto;
        padding: 40px;
        background: var(--paper);
        border: 1px solid var(--line);
        border-radius: 10px;
      }
      .admin-login h1 {
        font-size: 1.6rem;
        margin-bottom: 8px;
      }
      .admin-login p {
        color: var(--royal);
        font-size: 0.9rem;
        margin-bottom: 20px;
      }
      .admin-login input {
        width: 100%;
        padding: 12px 14px;
        border: 1px solid var(--line);
        border-radius: 6px;
        font-family: var(--body);
        font-size: 0.95rem;
        margin-bottom: 12px;
      }
      .admin-top {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        flex-wrap: wrap;
        gap: 12px;
        margin-bottom: 30px;
      }
      .admin-top h1 {
        font-size: 1.9rem;
      }
      .admin-meta {
        color: var(--royal);
        font-size: 0.85rem;
      }
      .admin-toolbar {
        display: flex;
        gap: 10px;
        align-items: center;
        margin-bottom: 24px;
        flex-wrap: wrap;
      }
      .admin-toolbar input[type="search"] {
        padding: 10px 14px;
        border: 1px solid var(--line);
        border-radius: 6px;
        font-family: var(--body);
        min-width: 220px;
      }
      .admin-toolbar select {
        padding: 10px 14px;
        border: 1px solid var(--line);
        border-radius: 6px;
        font-family: var(--body);
        background: var(--paper);
      }
      .order-card {
        background: var(--paper);
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 20px 24px;
        margin-bottom: 16px;
      }
      .order-card-head {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        flex-wrap: wrap;
        gap: 10px;
        margin-bottom: 12px;
      }
      .order-ref {
        font-family: var(--display);
        font-size: 1.2rem;
        color: var(--ink);
      }
      .order-email {
        font-size: 0.85rem;
        color: var(--royal);
      }
      .order-date {
        font-size: 0.78rem;
        color: var(--azure);
      }
      .order-items {
        font-size: 0.88rem;
        margin: 10px 0;
        border-top: 1px solid var(--mist);
        padding-top: 10px;
      }
      .order-item-row {
        display: flex;
        justify-content: space-between;
        padding: 4px 0;
      }
      .order-total-row {
        display: flex;
        justify-content: space-between;
        font-weight: 600;
        padding-top: 8px;
        border-top: 1px solid var(--mist);
        margin-top: 6px;
      }
      .order-section-label {
        font-size: 0.72rem;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: var(--royal);
        margin-top: 14px;
        margin-bottom: 4px;
      }
      .order-shipping {
        font-size: 0.88rem;
        line-height: 1.5;
        background: var(--mist);
        border-radius: 6px;
        padding: 10px 12px;
      }
      .order-shipping-missing {
        color: var(--royal);
        font-style: italic;
      }
      .order-controls {
        display: flex;
        gap: 8px;
        align-items: center;
        margin-top: 14px;
        flex-wrap: wrap;
      }
      .order-controls select {
        padding: 8px 12px;
        border: 1px solid var(--line);
        border-radius: 6px;
        font-family: var(--body);
        font-size: 0.85rem;
      }
      .admin-empty {
        text-align: center;
        padding: 60px 20px;
        color: var(--royal);
      }
      .admin-hidden {
        display: none !important;
      }
      .admin-tabs {
        display: flex;
        gap: 6px;
        margin-bottom: 22px;
        border-bottom: 1px solid var(--line);
      }
      .admin-tab {
        background: none;
        border: none;
        padding: 10px 16px;
        font-family: var(--body);
        font-size: 0.9rem;
        color: var(--royal);
        cursor: pointer;
        border-bottom: 2px solid transparent;
        margin-bottom: -1px;
      }
      .admin-tab.is-active {
        color: var(--ink);
        border-bottom-color: var(--ink);
        font-weight: 600;
      }
      .admin-tab-badge {
        display: inline-block;
        min-width: 18px;
        padding: 1px 6px;
        border-radius: 999px;
        background: #b33;
        color: #fff;
        font-size: 0.72rem;
        text-align: center;
      }
      .admin-tab-badge:empty {
        display: none;
      }
      .pending-intro {
        color: var(--royal);
        font-size: 0.88rem;
        max-width: 640px;
        margin-bottom: 20px;
        line-height: 1.6;
      }
      .pending-card {
        display: grid;
        grid-template-columns: 120px 1fr;
        gap: 18px;
        background: var(--paper);
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 18px;
        margin-bottom: 16px;
      }
      .pending-thumb {
        width: 120px;
        height: 140px;
        border-radius: 8px;
        overflow: hidden;
        background: var(--mist);
      }
      .pending-thumb img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }
      .pending-fields {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }
      .pending-fields .full {
        grid-column: 1 / -1;
      }
      .pending-fields label {
        display: block;
        font-size: 0.72rem;
        text-transform: uppercase;
        letter-spacing: 0.03em;
        color: var(--royal);
        margin-bottom: 4px;
      }
      .pending-fields input {
        width: 100%;
        padding: 8px 10px;
        border: 1px solid var(--line);
        border-radius: 6px;
        font-family: var(--body);
        font-size: 0.85rem;
      }
      .pending-meta {
        font-size: 0.75rem;
        color: var(--azure);
        grid-column: 1 / -1;
      }
      .pending-actions {
        grid-column: 1 / -1;
        display: flex;
        gap: 10px;
        margin-top: 4px;
      }
      @media (max-width: 640px) {
        .pending-card {
          grid-template-columns: 1fr;
        }
        .pending-thumb {
          width: 100%;
          height: 200px;
        }
      }
    </style>
  </head>
  <body>
    <!-- ===================== LOGIN GATE ===================== -->
    <div class="admin-login" data-admin-login>
      <h1>Order Admin</h1>
      <p>Enter your admin secret to view and manage orders.</p>
      <input
        type="password"
        placeholder="Admin secret"
        data-admin-secret-input
        autocomplete="off"
      />
      <div class="cm-error" data-admin-login-error></div>
      <button
        class="btn btn-solid"
        style="width: 100%; justify-content: center"
        data-admin-login-btn
      >
        Unlock
      </button>
    </div>

    <!-- ===================== DASHBOARD ===================== -->
    <div class="admin-wrap admin-hidden" data-admin-dashboard>
      <div class="admin-top">
        <div>
          <h1 data-admin-tab-title>Orders</h1>
          <div class="admin-meta" data-admin-count>Loading…</div>
        </div>
        <button class="btn btn-ghost btn-sm" data-admin-logout>Log out</button>
      </div>

      <div class="admin-tabs">
        <button class="admin-tab is-active" data-admin-tab="orders">
          Orders
        </button>
        <button class="admin-tab" data-admin-tab="pending">
          Pending Products
          <span class="admin-tab-badge" data-pending-badge></span>
        </button>
      </div>

      <!-- ---- Orders tab ---- -->
      <div data-admin-panel="orders">
        <div class="admin-toolbar">
          <input
            type="search"
            placeholder="Search email or reference…"
            data-admin-search
          />
          <select data-admin-filter>
            <option value="">All statuses</option>
            <option value="Paid">Paid</option>
            <option value="Processing">Processing</option>
            <option value="Shipped">Shipped</option>
            <option value="Delivered">Delivered</option>
          </select>
          <button class="btn btn-ghost btn-sm" data-admin-refresh>
            Refresh
          </button>
        </div>

        <div data-admin-orders></div>
      </div>

      <!-- ---- Pending Products tab ---- -->
      <div data-admin-panel="pending" class="admin-hidden">
        <p class="pending-intro">
          Products you’ve sent from WhatsApp land here first. Review the photo
          and details, fix anything WhatsApp got wrong, then approve to publish
          to the live shop — or reject to discard it.
        </p>
        <div class="admin-toolbar">
          <button class="btn btn-ghost btn-sm" data-pending-refresh>
            Refresh
          </button>
        </div>
        <div data-pending-list></div>
      </div>
    </div>

    <div class="toast" data-toast></div>

    <script src="admin.js"></script>
  </body>
</html>
