<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Order Confirmed | E-Com-Luxe</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main
      style="
        max-width: 600px;
        margin: 80px auto;
        text-align: center;
        padding: 0 20px;
      "
    >
      <h1>🎉 Thank you for your order!</h1>
      <p>Your payment was successful. A confirmation email is on its way.</p>
      <p id="session-info" style="color: #888; font-size: 0.9em"></p>
      <a href="index.html">← Back to shop</a>
    </main>

    <script>
      // Clear the cart now that payment succeeded
      localStorage.removeItem("lev_cart_v1");

      // Optional: show a reference if Paystack included one in the URL
      const params = new URLSearchParams(window.location.search);
      const reference = params.get("reference") || params.get("trxref");
      if (reference) {
        document.getElementById("session-info").textContent =
          "Order reference: " + reference;
      }
    </script>
  </body>
</html>
